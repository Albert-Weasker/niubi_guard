name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      publish_npm:
        description: Publish the current ref to npm
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.1.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check
        run: pnpm check

      - name: Verify npm package
        run: npm pack --dry-run

      - name: Publish to npm
        if: github.event_name == 'workflow_dispatch' && inputs.publish_npm && env.NODE_AUTH_TOKEN != ''
        run: npm publish --provenance

      - name: Skip npm publish
        if: github.event_name != 'workflow_dispatch' || !inputs.publish_npm || env.NODE_AUTH_TOKEN == ''
        run: echo "npm publish skipped. Use workflow_dispatch with publish_npm=true and a valid NPM_TOKEN to publish."
